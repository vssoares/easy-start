name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - release
      - 'release/**'
    tags:
      - 'easy-start-v*'

permissions:
  contents: write

# Actions em Node 24 (Node 20 deprecado nos runners — jun/2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 32

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Cache Angular build
        uses: actions/cache@v4
        with:
          path: .angular/cache
          key: angular-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('tsconfig*.json', 'angular.json', 'src/**/*.ts') }}
          restore-keys: |
            angular-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            angular-${{ runner.os }}-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-windows
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Verificar chave de assinatura
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw 'Secret TAURI_SIGNING_PRIVATE_KEY não configurado. Sem ela não há .sig nem latest.json.'
          }
          Write-Host 'Chave de assinatura presente.'

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: easy-start-v__VERSION__
          releaseName: Easy Start v__VERSION__
          releaseBody: |
            Instalador Windows e atualização automática para esta versão.

            Baixe o instalador `.exe` nos assets abaixo.
            O manifesto de atualização: https://github.com/vssoares/easy-start/releases/latest/download/latest.json
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          retryAttempts: 1
          args: --config src-tauri/tauri.ci.conf.json --ci

      - name: Verificar manifesto de atualização
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "easy-start-v${{ steps.tauri.outputs.appVersion }}"
          $apiHeaders = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag" -Headers $apiHeaders
          if ($release.draft) {
            throw "Release $tag está em rascunho — /latest/download/ não funciona até publicar."
          }

          $asset = $release.assets | Where-Object { $_.name -eq 'latest.json' }
          if (-not $asset) {
            throw "Asset latest.json ausente no release $tag"
          }

          # Download via API (funciona no CI mesmo com repo privado)
          $assetUrl = "https://api.github.com/repos/${{ github.repository }}/releases/assets/$($asset.id)"
          $bytes = Invoke-WebRequest -Uri $assetUrl -Headers @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = 'application/octet-stream'
          } -UseBasicParsing
          $json = [System.Text.Encoding]::UTF8.GetString($bytes.Content) | ConvertFrom-Json
          Write-Host "Release OK: $($release.html_url)"
          Write-Host "Versão no manifesto: $($json.version)"

          # URL usada pelo app — /latest/ pode demorar ou exigir auth no runner
          $publicUrl = 'https://github.com/vssoares/easy-start/releases/latest/download/latest.json'
          Write-Host "Testando URL do updater: $publicUrl"
          $latestOk = $false
          for ($i = 1; $i -le 6; $i++) {
            try {
              $r = Invoke-WebRequest -Uri $publicUrl -UseBasicParsing -MaximumRedirection 10 -Headers @{
                Authorization = "Bearer $env:GH_TOKEN"
                'User-Agent' = 'easy-start-release-ci'
              }
              if ($r.StatusCode -eq 200) {
                $latestOk = $true
                Write-Host "URL /latest/download/ OK (tentativa $i)"
                break
              }
            } catch {
              Write-Host "Tentativa $i/6: $($_.Exception.Message)"
              Start-Sleep -Seconds 10
            }
          }

          if (-not $latestOk) {
            Write-Warning '/latest/download/ ainda retornou erro no runner.'
            Write-Warning 'O asset do release está OK; se o repo for privado, torne-o público para o updater no app instalado.'
            Write-Warning "Use no navegador (logado): $($asset.browser_download_url)"
          }
