name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - release
      - 'release/**'
    tags:
      - 'easy-start-v*'

permissions:
  contents: write
  pages: write
  id-token: write

# Actions em Node 24 (Node 20 deprecado nos runners — jun/2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Registry sparse + compilação release mais rápida (só CI)
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 32

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Cache Angular build
        uses: actions/cache@v4
        with:
          path: .angular/cache
          key: angular-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('tsconfig*.json', 'angular.json', 'src/**/*.ts') }}
          restore-keys: |
            angular-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            angular-${{ runner.os }}-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-windows
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Install frontend dependencies
        run: npm ci

      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: easy-start-v__VERSION__
          releaseName: Easy Start v__VERSION__
          releaseBody: |
            Instalador Windows e atualização automática para esta versão.

            Baixe o instalador `.exe` nos assets abaixo.
            O arquivo `latest.json` é usado pelo app para detectar atualizações.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          retryAttempts: 1
          # CI: só NSIS (WiX/MSI dobra o tempo de bundle no Windows)
          args: --config src-tauri/tauri.ci.conf.json --ci

      - name: Localizar latest.json do build
        id: manifest
        shell: pwsh
        run: |
          $manifest = Get-ChildItem -Path src-tauri/target -Recurse -Filter latest.json -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $manifest) {
            throw 'latest.json não encontrado após o build. Verifique TAURI_SIGNING_PRIVATE_KEY e createUpdaterArtifacts.'
          }
          Write-Host "Manifesto: $($manifest.FullName)"
          "path=$($manifest.FullName)" >> $env:GITHUB_OUTPUT

      - name: Publicar latest.json no GitHub Pages (URL pública)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path updater-pages | Out-Null
          Copy-Item -Force "${{ steps.manifest.outputs.path }}" updater-pages/latest.json

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: updater-pages
          publish_branch: gh-pages

      - name: Verificar manifesto (API autenticada)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "easy-start-v${{ steps.tauri.outputs.appVersion }}"
          $api = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag"
          $release = Invoke-RestMethod -Uri $api -Headers @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = 'application/vnd.github+json'
          }
          $asset = $release.assets | Where-Object { $_.name -eq 'latest.json' }
          if (-not $asset) {
            throw "Asset latest.json ausente no release $tag"
          }
          Write-Host "Release OK: $($release.html_url)"
          Write-Host "latest.json: $($asset.browser_download_url)"

      - name: Verificar GitHub Pages
        shell: pwsh
        run: |
          Start-Sleep -Seconds 5
          $pagesUrl = "https://${{ github.repository_owner }}.github.io/easy-start/latest.json"
          Write-Host "Testando: $pagesUrl"
          $max = 3
          for ($i = 1; $i -le $max; $i++) {
            try {
              $r = Invoke-WebRequest -Uri $pagesUrl -UseBasicParsing
              if ($r.StatusCode -eq 200) {
                Write-Host "GitHub Pages OK (tentativa $i)"
                exit 0
              }
            } catch {
              Write-Host "Tentativa $i/$max falhou, aguardando..."
              Start-Sleep -Seconds 5
            }
          }
          Write-Warning "Pages ainda não respondeu. Ative GitHub Pages (branch gh-pages) em Settings → Pages."
